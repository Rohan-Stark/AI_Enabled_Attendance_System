{% extends "base.html" %}
{% block title %}Login — SmartAttend{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-container">
        <!-- Left side — branding -->
        <div class="login-hero">
            <div class="hero-content">
                <div class="hero-icon">
                    <i class="fas fa-fingerprint"></i>
                </div>
                <h1>SmartAttend</h1>
                <p>AI-Powered Face Recognition Attendance System</p>
                <div class="hero-features">
                    <div class="hero-feature">
                        <i class="fas fa-camera"></i>
                        <span>Real-time Face Detection</span>
                    </div>
                    <div class="hero-feature">
                        <i class="fas fa-shield-alt"></i>
                        <span>Anti-Spoofing Protection</span>
                    </div>
                    <div class="hero-feature">
                        <i class="fas fa-chart-line"></i>
                        <span>Smart Analytics</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right side — login form -->
        <div class="login-form-container">
            <h2>Welcome Back</h2>
            <p class="login-subtitle">Sign in to your account</p>

            <form method="POST" action="{{ url_for('auth.login') }}" class="login-form" id="loginForm">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <!-- Role Selection -->
                <div class="role-selector">
                    <label class="role-option">
                        <input type="radio" name="role" value="admin" required>
                        <div class="role-card">
                            <i class="fas fa-user-shield"></i>
                            <span>Admin</span>
                        </div>
                    </label>
                    <label class="role-option">
                        <input type="radio" name="role" value="teacher" required>
                        <div class="role-card">
                            <i class="fas fa-chalkboard-teacher"></i>
                            <span>Teacher</span>
                        </div>
                    </label>
                    <label class="role-option">
                        <input type="radio" name="role" value="student" required>
                        <div class="role-card">
                            <i class="fas fa-user-graduate"></i>
                            <span>Student</span>
                        </div>
                    </label>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email">
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="fas fa-eye" id="passwordIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    const input = document.getElementById('password');
    const icon = document.getElementById('passwordIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
{% endblock %}
